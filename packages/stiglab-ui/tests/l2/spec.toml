# L2 Web UI Test Specification — PR Validation
#
# This spec defines what the AI must verify on PRs using agent-browser.
# It is NOT for regression — regression lives in L1 (crystallized tests).
#
# Lifecycle:
#   1. PR arrives → L2 runs this spec against changed surfaces
#   2. L2 finds issues → posts findings as PR comment
#   3. Validated behavior → crystallize into L1 tests (via web-testing skill)
#   4. L1 catches regressions going forward
#
# Spec types:
#   [route.*]     — verify a page renders correctly after PR changes
#   [flow.*]      — verify multi-step interactions still work
#   [invariant.*] — properties that must hold on any page touched by the PR

# ─── Routes ────────────────────────────────────────────────────
# Check these only if the PR touches files related to the route.

[route.dashboard]
path = "/"
related_paths = ["src/pages/DashboardPage", "src/components/dashboard/"]
must_contain = ["Nodes Online", "Active Sessions", "Waiting Input", "Completed", "Recent Sessions"]
must_not_contain = ["undefined", "NaN", "Error"]

[route.sessions]
path = "/sessions"
related_paths = ["src/pages/SessionsPage", "src/components/sessions/"]
must_contain = ["Sessions", "All Sessions"]
must_not_contain = ["undefined", "NaN"]

[route.session_detail]
path = "/sessions/test-id"
related_paths = ["src/pages/SessionDetailPage", "src/components/sessions/"]
must_contain_any = ["not found", "Not found", "Loading", "Session Details"]
must_not_contain = ["Cannot read properties", "Uncaught", "undefined"]

[route.nodes]
path = "/nodes"
related_paths = ["src/pages/NodesPage", "src/components/nodes/"]
must_contain = ["Nodes", "Registered Nodes"]
must_not_contain = ["undefined", "NaN"]

# ─── Flows ─────────────────────────────────────────────────────
# Check these if the PR touches navigation, layout, or the involved components.

[flow.sidebar_navigation]
description = "Navigate between all pages using sidebar links"
related_paths = ["src/components/layout/", "src/App.tsx"]
steps = [
  "Open /",
  "Verify Dashboard content loads",
  "Click Sessions link in sidebar",
  "Verify URL changed to /sessions",
  "Click Nodes link in sidebar",
  "Verify URL changed to /nodes",
  "Click Dashboard link in sidebar",
  "Verify URL changed to /",
]

[flow.theme_toggle]
description = "Toggle between light and dark themes"
related_paths = ["src/components/layout/ThemeToggle", "src/components/providers/ThemeProvider"]
steps = [
  "Open /",
  "Find and click theme toggle button",
  "Verify theme changed (class or attribute on html/body)",
  "Click theme toggle again",
  "Verify theme reverted",
]

[flow.session_click_through]
description = "Click a session row to view its detail page"
related_paths = ["src/components/sessions/SessionTable", "src/pages/SessionDetailPage"]
steps = [
  "Open /sessions",
  "If sessions exist, click the first session link",
  "Verify navigation to /sessions/:id",
  "Verify session detail content renders",
  "If no sessions, verify empty state message",
]

# ─── Invariants ────────────────────────────────────────────────
# Always checked on every page the PR touches.

[invariant.no_console_errors]
description = "No uncaught errors or unhandled rejections"
check = "Visit each PR-affected route, verify no JavaScript errors in console"

[invariant.no_broken_layout]
description = "Layout integrity"
check = "Each PR-affected route should have sidebar/nav and main content area"

[invariant.graceful_api_failure]
description = "Graceful degradation when API is unreachable"
check = "PR-affected pages show loading or empty states, not crash"
