# Unified CI pipeline: lint, test, Docker build, web UI tests, publish.
# Single workflow with proper job dependencies — no cross-workflow complexity.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Stage 1: Fast checks (parallel) ─────────────────────────

  ci:
    uses: codervisor/codervisor/.github/workflows/ci-rust.yml@main

  l1-smoke:
    name: "L1: Component Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run L1 smoke tests
        working-directory: packages/stiglab-ui
        run: npx vitest run --config vitest.config.ts

  docker:
    name: "Docker Build & Smoke Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and export Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v5.16.0
        with:
          context: .
          file: Dockerfile
          push: false
          outputs: type=docker,dest=/tmp/stiglab.tar
          tags: stiglab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image and run container
        run: |
          docker load -i /tmp/stiglab.tar
          docker run -d --name stiglab-ci \
            -p 3000:3000 \
            -e DATABASE_URL="sqlite:///tmp/stiglab-ci.db" \
            -e STIGLAB_HOST=0.0.0.0 \
            stiglab:ci server

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container did not become healthy within 30s"
          docker logs stiglab-ci
          exit 1

      - name: Verify UI is served
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)
          if [ "$STATUS" != "200" ]; then
            echo "::error::UI not served (HTTP ${STATUS})"
            exit 1
          fi
          echo "UI served OK (HTTP 200)"

      - name: Verify API health response
        run: |
          HEALTH=$(curl -sf http://localhost:3000/api/health)
          echo "Health response: ${HEALTH}"
          echo "$HEALTH" | jq -e '.status' >/dev/null

      - name: Cleanup container
        if: always()
        run: |
          docker logs stiglab-ci || true
          docker rm -f stiglab-ci || true

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stiglab-docker-image
          path: /tmp/stiglab.tar
          retention-days: 1

  # ── Stage 2: E2E + L2 (depend on Docker) ────────────────────

  l1-e2e:
    name: "L1: E2E Tests"
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stiglab-docker-image
          path: /tmp

      - name: Load and start Docker container
        run: |
          docker load -i /tmp/stiglab.tar
          docker run -d --name stiglab-e2e \
            -p 3000:3000 \
            -e STIGLAB_HOST=0.0.0.0 \
            -e PORT=3000 \
            stiglab:ci server
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become ready within 60s" >&2
          docker logs stiglab-e2e
          exit 1

      - name: Run L1 e2e tests
        working-directory: packages/stiglab-ui
        env:
          STIGLAB_TEST_URL: http://localhost:3000
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx vitest run --config vitest.e2e.config.ts tests/e2e/smoke.test.ts
          else
            npx vitest run --config vitest.e2e.config.ts
          fi

      - name: Stop Docker container
        if: always()
        run: docker rm -f stiglab-e2e 2>/dev/null || true

  l2:
    name: "L2: AI Testing"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.fork == false
    needs: [l1-smoke, docker]
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stiglab-docker-image
          path: /tmp

      - name: Load and start Docker container
        run: |
          docker load -i /tmp/stiglab.tar
          docker run -d --name stiglab-l2 \
            -p 3000:3000 \
            -e STIGLAB_HOST=0.0.0.0 \
            -e PORT=3000 \
            stiglab:ci server
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become ready within 60s" >&2
          docker logs stiglab-l2
          exit 1

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --version
          echo "CLAUDE_CODE_OAUTH_TOKEN is set: $([[ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]] && echo yes || echo NO)"

      - name: Determine diff range
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=origin/main...HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "range=HEAD~1...HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run L2 testing
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DIFF_RANGE: ${{ steps.diff.outputs.range }}
        run: |
          set -eo pipefail
          mkdir -p /tmp/l2-screenshots
          SCHEMA=$(cat packages/stiglab-ui/tests/l2-verdict-schema.json)

          claude -p "$(cat <<PROMPT
          Run L2 web UI tests. The app is running in Docker at
          http://localhost:3000 (same image that gets deployed to production).
          Follow .claude/skills/web-testing/SKILL.md.

          1. Read the diff (git diff ${DIFF_RANGE})
          2. Map changed files to affected UI routes
          3. For EACH affected page, test at BOTH viewports:
             a. Desktop (1280x720): \`agent-browser set viewport 1280 720\`
             b. Mobile (375x812): \`agent-browser set viewport 375 812\`
          4. At each viewport, open the page at http://localhost:3000 and:
             - Verify elements render correctly
             - Check for layout issues (especially horizontal overflow on mobile)
             - Exercise interactive elements: click buttons, fill forms, submit,
               and verify the resulting UI state (not just that markup exists)
             - Take a screenshot: \`agent-browser screenshot --screenshot-dir /tmp/l2-screenshots\`
             - Rename to convention: /tmp/l2-screenshots/{slug}-{desktop|mobile}.png
          5. Crystallize: write L1 tests for any validated new behavior
          6. Set verdict to PASS if all pages pass at both viewports, FAIL if any fail

          IMPORTANT: Every page MUST have both desktop and mobile screenshots saved
          to /tmp/l2-screenshots/. Include the path in viewports[].screenshot.

          Keep it cheap — only test what the diff touches.
          PROMPT
          )" \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --json-schema "$SCHEMA" \
            | node packages/stiglab-ui/tests/parse-l2-stream.mjs /tmp/l2-result.json \
            || true

          echo "::group::Raw result JSON"
          cat /tmp/l2-result.json 2>/dev/null || echo '{"result":"L2 agent produced no output"}'
          echo "::endgroup::"

          VERDICT=$(jq -r '.structured_output.verdict // empty' /tmp/l2-result.json 2>/dev/null || true)
          if [ -z "$VERDICT" ]; then
            echo "::error::No structured verdict — treating as inconclusive"
            jq -r '.result // "No result field found"' /tmp/l2-result.json > /tmp/l2-verdict-raw.md 2>/dev/null || cat /tmp/l2-result.json > /tmp/l2-verdict-raw.md
            {
              echo "## L2: AI Testing"
              echo ""
              echo "> **⚠️ INCONCLUSIVE** — agent did not produce a structured verdict"
              echo ""
              cat /tmp/l2-verdict-raw.md
            } > /tmp/l2-comment.md
            cat /tmp/l2-comment.md >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          node packages/stiglab-ui/tests/format-l2-comment.mjs \
            /tmp/l2-result.json \
            /tmp/l2-comment.md
          cat /tmp/l2-comment.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$VERDICT" = "FAIL" ]; then
            echo "::error::L2 testing verdict: FAIL"
            exit 1
          fi

      - name: Persist crystallized tests
        if: >-
          always() && !cancelled() &&
          github.event_name == 'pull_request' &&
          github.actor != 'github-actions[bot]'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Detect new or modified test files written by L2 crystallization
          # --diff-filter=AM excludes deleted paths that would break cp
          CRYSTAL=$(
            { git diff --diff-filter=AM --name-only; git ls-files --others --exclude-standard; } \
            | grep -E '^packages/stiglab-ui/tests/(smoke|e2e)/' \
            | sort -u
          ) || true

          if [ -z "$CRYSTAL" ]; then
            echo "No crystallized tests to persist"
            exit 0
          fi

          echo "Crystallized test files:"
          echo "$CRYSTAL"

          # Save crystallized files before switching branches
          mkdir -p /tmp/crystallized
          while IFS= read -r f; do
            mkdir -p "/tmp/crystallized/$(dirname "$f")"
            cp "$f" "/tmp/crystallized/$f"
          done <<< "$CRYSTAL"

          # Switch to the PR branch (checkout leaves us on detached merge commit)
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"

          # Copy crystallized files back and commit
          while IFS= read -r f; do
            mkdir -p "$(dirname "$f")"
            cp "/tmp/crystallized/$f" "$f"
          done <<< "$CRYSTAL"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r f; do
            git add -- "$f"
          done <<< "$CRYSTAL"

          if git diff --cached --quiet; then
            echo "::notice::No staged crystallized test changes to commit"
          else
            git commit -m "test: crystallize L2 findings into L1 tests"
            git push origin "$PR_BRANCH"
            echo "::notice::Crystallized tests committed to ${PR_BRANCH}"
          fi

      - name: Stop Docker container
        if: always()
        run: docker rm -f stiglab-l2 2>/dev/null || true

      - name: Upload L2 screenshots
        if: always() && !cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: l2-screenshots
          path: /tmp/l2-screenshots/
          if-no-files-found: warn
          retention-days: 30

      - name: Push screenshots to branch for embedding
        if: >-
          always() && !cancelled() &&
          github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          SCREENSHOT_COUNT=$(find /tmp/l2-screenshots -name '*.png' 2>/dev/null | wc -l || echo 0)
          if [ "$SCREENSHOT_COUNT" -eq 0 ]; then
            echo "No screenshots to push"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH="l2-screenshots/pr-${PR_NUMBER}"
          REPO="${{ github.repository }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$BRANCH"
          git rm -rf . 2>/dev/null || true
          cp /tmp/l2-screenshots/*.png . 2>/dev/null || true
          git add *.png 2>/dev/null || true
          git commit -m "L2 screenshots for PR #${PR_NUMBER}" --allow-empty
          git push -f origin "$BRANCH"

          echo "SCREENSHOT_BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          echo "SCREENSHOT_REPO=${REPO}" >> "$GITHUB_ENV"

      - name: Post L2 results to PR
        if: >-
          always() && !cancelled() &&
          github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/l2-comment.md ]; then
            echo "No L2 results to post"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          MARKER="<!-- l2-verdict -->"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_URL="${RUN_URL}#artifacts"
          API_BASE="https://api.github.com/repos/${{ github.repository }}"
          AUTH_HEADER="Authorization: Bearer ${GITHUB_TOKEN}"
          REPO="${{ github.repository }}"

          SCREENSHOT_MD=""
          BRANCH="${SCREENSHOT_BRANCH:-}"
          if [ -n "$BRANCH" ]; then
            SCREENSHOT_MD=$(
              for f in /tmp/l2-screenshots/*.png; do
                [ -f "$f" ] || continue
                NAME=$(basename "$f" .png)
                LABEL=$(echo "$NAME" | sed 's/-/ /g; s/\b\(.\)/\u\1/g' | sed 's/ Desktop/ — Desktop/; s/ Mobile/ — Mobile/')
                echo "![${LABEL}](https://raw.githubusercontent.com/${REPO}/${BRANCH}/$(basename "$f"))"
              done
            )
          fi

          SCREENSHOT_COUNT=$(find /tmp/l2-screenshots -name '*.png' 2>/dev/null | wc -l || echo 0)

          {
            echo "$MARKER"
            cat /tmp/l2-comment.md
            echo ""
            if [ -n "$SCREENSHOT_MD" ]; then
              echo "### Screenshots"
              echo ""
              echo "<details open>"
              echo "<summary>${SCREENSHOT_COUNT} screenshots (Desktop + Mobile)</summary>"
              echo ""
              echo "$SCREENSHOT_MD"
              echo ""
              echo "</details>"
              echo ""
            elif [ "$SCREENSHOT_COUNT" -gt 0 ]; then
              echo "---"
              echo "> **Screenshots**: ${SCREENSHOT_COUNT} captured — [Download from CI artifacts](${ARTIFACT_URL})"
              echo ""
            fi
            echo "---"
            echo "<sub>Posted by [L2 CI run](${RUN_URL}) • $(date -u '+%Y-%m-%d %H:%M UTC')</sub>"
          } > /tmp/l2-comment-final.md

          BODY_JSON=$(jq -n --arg body "$(cat /tmp/l2-comment-final.md)" '{body: $body}')

          COMMENT_ID=$(curl -sf -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
            "${API_BASE}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq -r ".[] | select(.body | contains(\"${MARKER}\")) | .id" | tail -1 || true)

          if [ -n "$COMMENT_ID" ]; then
            curl -sf -X PATCH -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
              -d "$BODY_JSON" "${API_BASE}/issues/comments/${COMMENT_ID}" > /dev/null
            echo "Updated existing PR comment $COMMENT_ID"
          else
            curl -sf -X POST -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
              -d "$BODY_JSON" "${API_BASE}/issues/${PR_NUMBER}/comments" > /dev/null
            echo "Created new PR comment"
          fi

  l2-triage:
    name: "L2: Triage L1 Failure"
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.l1-e2e.result == 'failure' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.fork == false)
    needs: [l1-e2e, docker]
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stiglab-docker-image
          path: /tmp

      - name: Load and start Docker container
        run: |
          docker load -i /tmp/stiglab.tar
          docker run -d --name stiglab-l2-triage \
            -p 3000:3000 \
            -e STIGLAB_HOST=0.0.0.0 \
            -e PORT=3000 \
            stiglab:ci server
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become ready within 60s" >&2
          docker logs stiglab-l2-triage
          exit 1

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Triage L1 failure
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -eo pipefail
          SCHEMA=$(cat packages/stiglab-ui/tests/l2-triage-schema.json)

          claude -p "$(cat <<'PROMPT'
          L1 e2e tests failed. Triage the failure.
          The app is running in Docker at http://localhost:3000
          (same image that gets deployed to production).

          1. Read the failing L1 tests in packages/stiglab-ui/tests/e2e/
          2. Use agent-browser at http://localhost:3000 to reproduce and diagnose
          3. For each failed test, determine: regression, flaky, or environment issue
          4. Provide root cause and suggested fix
          PROMPT
          )" --max-turns 20 \
            --allowedTools "Bash,Read,Glob,Grep" \
            --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --json-schema "$SCHEMA" \
            | node packages/stiglab-ui/tests/parse-l2-stream.mjs /tmp/l2-triage.json

          echo "::group::Raw result JSON"
          cat /tmp/l2-triage.json
          echo "::endgroup::"

          ROOT_CAUSE=$(jq -r '.structured_output.root_cause // empty' /tmp/l2-triage.json 2>/dev/null || true)
          if [ -z "$ROOT_CAUSE" ]; then
            echo "::warning::structured_output not found, falling back to .result"
            {
              echo "## L2: Triage L1 Failure"
              echo ""
              jq -r '.result // "No result field found"' /tmp/l2-triage.json 2>/dev/null || cat /tmp/l2-triage.json
            } > /tmp/l2-triage-comment.md
            cat /tmp/l2-triage-comment.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## L2: Triage L1 Failure"
            echo ""
            echo "### Failed tests"
            echo "| Test | Diagnosis | Expected | Actual |"
            echo "|------|-----------|----------|--------|"
            jq -r '.structured_output.failed_tests[]? | "| \(.test) | \(.diagnosis) | \(.expected) | \(.actual) |"' /tmp/l2-triage.json
            echo ""
            echo "### Root cause"
            jq -r '.structured_output.root_cause' /tmp/l2-triage.json
            echo ""
            echo "### Suggested fix"
            jq -r '.structured_output.suggested_fix' /tmp/l2-triage.json
          } > /tmp/l2-triage-comment.md
          cat /tmp/l2-triage-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Stop Docker container
        if: always()
        run: docker rm -f stiglab-l2-triage 2>/dev/null || true

      - name: Post triage results to PR
        if: >-
          always() && !cancelled() &&
          github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/l2-triage-comment.md ]; then
            echo "No triage results to post"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          MARKER="<!-- l2-triage -->"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          API_BASE="https://api.github.com/repos/${{ github.repository }}"
          AUTH_HEADER="Authorization: Bearer ${GITHUB_TOKEN}"

          {
            echo "$MARKER"
            cat /tmp/l2-triage-comment.md
            echo ""
            echo "---"
            echo "<sub>Posted by [L2 triage CI run](${RUN_URL}) • $(date -u '+%Y-%m-%d %H:%M UTC')</sub>"
          } > /tmp/l2-triage-comment-final.md

          BODY_JSON=$(jq -n --arg body "$(cat /tmp/l2-triage-comment-final.md)" '{body: $body}')

          COMMENT_ID=$(curl -sf -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
            "${API_BASE}/issues/${PR_NUMBER}/comments?per_page=100" \
            | jq -r ".[] | select(.body | contains(\"${MARKER}\")) | .id" | tail -1 || true)

          if [ -n "$COMMENT_ID" ]; then
            curl -sf -X PATCH -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
              -d "$BODY_JSON" "${API_BASE}/issues/comments/${COMMENT_ID}" > /dev/null
            echo "Updated existing PR comment $COMMENT_ID"
          else
            curl -sf -X POST -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" \
              -d "$BODY_JSON" "${API_BASE}/issues/${PR_NUMBER}/comments" > /dev/null
            echo "Created new PR comment"
          fi

