# Publishes the Docker image to GHCR after Web UI Tests pass on main.
# Uses workflow_run to trigger after "Web UI Tests" completes.
# Verifies that CI also passed before publishing.
# The Docker build uses GHA cache, so it's a near-instant cache hit
# from the ci.yml and web-tests.yml builds.
name: Publish

on:
  workflow_run:
    workflows: ["Web UI Tests"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify CI also passed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          # Check that the CI workflow's Docker job passed for this commit
          CONCLUSION=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${SHA}/check-runs?check_name=Docker+Build+%26+Smoke+Test&per_page=1" \
            | jq -r '.check_runs[0].conclusion // "pending"')
          echo "CI Docker job conclusion: ${CONCLUSION}"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI has not passed (Docker job: ${CONCLUSION}). Skipping publish."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v5.16.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
