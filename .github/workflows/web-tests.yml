name: "Web UI Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── L1: Deterministic regression tests ───────────────────────

  # L1 component smoke: runs on every push and PR
  l1-smoke:
    name: "L1: Component Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run L1 smoke tests
        working-directory: packages/stiglab-ui
        run: npx vitest run --config vitest.config.ts

  # L1 e2e: full regression on main and pre-release
  l1-e2e:
    name: "L1: E2E Regression"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Wait for preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready within 30s" >&2
          exit 1

      - name: Run L1 e2e tests
        working-directory: packages/stiglab-ui
        env:
          STIGLAB_TEST_URL: http://localhost:5173
        run: npx vitest run --config vitest.e2e.config.ts

  # L1 e2e smoke subset on PRs
  l1-e2e-pr:
    name: "L1: E2E Smoke (PR)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Wait for preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready within 30s" >&2
          exit 1

      - name: Run L1 e2e smoke tests
        working-directory: packages/stiglab-ui
        env:
          STIGLAB_TEST_URL: http://localhost:5173
        run: npx vitest run --config vitest.e2e.config.ts tests/e2e/smoke.test.ts

  # ── L2: AI-driven PR validation ──────────────────────────────

  # L2 on PRs: diff-scoped testing + crystallize into L1
  l2-pr:
    name: "L2: AI PR Testing"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    needs: [l1-smoke]
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Wait for preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready within 30s" >&2
          exit 1

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --version
          echo "CLAUDE_CODE_OAUTH_TOKEN is set: $([[ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]] && echo yes || echo NO)"

      - name: Run L2 diff-scoped PR testing
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -eo pipefail
          SCHEMA=$(cat packages/stiglab-ui/tests/l2-verdict-schema.json)

          # Stream JSON events: parser prints live logs to stderr, captures result to file
          claude -p "$(cat <<'PROMPT'
          Run L2 web UI tests for this PR. Follow .claude/skills/web-testing/SKILL.md.

          1. Read the PR diff (git diff origin/main...HEAD)
          2. Map changed files to affected UI routes
          3. Use agent-browser to test each affected page at http://localhost:5173
          4. Crystallize: write L1 tests for any validated new behavior
          5. Set verdict to PASS if all pages pass, FAIL if any fail

          Keep it cheap — only test what the diff touches.
          PROMPT
          )" --max-turns 25 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --json-schema "$SCHEMA" \
            | node packages/stiglab-ui/tests/parse-l2-stream.mjs /tmp/l2-result.json

          echo "::group::Raw result JSON"
          cat /tmp/l2-result.json
          echo "::endgroup::"

          # Try structured_output first (--json-schema), fall back to .result
          VERDICT=$(jq -r '.structured_output.verdict // empty' /tmp/l2-result.json 2>/dev/null || true)
          if [ -z "$VERDICT" ]; then
            echo "::warning::structured_output not found, falling back to .result"
            jq -r '.result // "No result field found"' /tmp/l2-result.json > /tmp/l2-verdict-raw.md 2>/dev/null || cat /tmp/l2-result.json > /tmp/l2-verdict-raw.md
            {
              echo "## L2: AI PR Testing"
              echo ""
              cat /tmp/l2-verdict-raw.md
            } > /tmp/l2-comment.md
            cat /tmp/l2-comment.md >> "$GITHUB_STEP_SUMMARY"
            if grep -qi "FAIL" /tmp/l2-verdict-raw.md; then
              exit 1
            fi
            exit 0
          fi

          SUMMARY=$(jq -r '.structured_output.summary // ""' /tmp/l2-result.json)

          # Write structured results to file and job summary
          {
            echo "## L2: AI PR Testing"
            echo ""
            echo "**Verdict**: ${VERDICT}"
            echo ""
            echo "${SUMMARY}"
            echo ""
            echo "### Pages tested"
            echo "| Route | Status | Notes |"
            echo "|-------|--------|-------|"
            jq -r '.structured_output.pages_tested[]? | "| \(.route) | \(.status) | \(.notes) |"' /tmp/l2-result.json
            echo ""
            ISSUES=$(jq -r '.structured_output.issues | length' /tmp/l2-result.json 2>/dev/null || echo 0)
            if [ "$ISSUES" -gt 0 ]; then
              echo "### Issues"
              jq -r '.structured_output.issues[] | "- \(.)"' /tmp/l2-result.json
              echo ""
            fi
            CRYSTALLIZED=$(jq -r '.structured_output.crystallized | length' /tmp/l2-result.json 2>/dev/null || echo 0)
            if [ "$CRYSTALLIZED" -gt 0 ]; then
              echo "### Crystallized into L1"
              jq -r '.structured_output.crystallized[] | "- \(.)"' /tmp/l2-result.json
              echo ""
            fi
          } > /tmp/l2-comment.md
          cat /tmp/l2-comment.md >> "$GITHUB_STEP_SUMMARY"

          # Exit based on verdict
          if [ "$VERDICT" != "PASS" ]; then
            echo "::error::L2 testing verdict: ${VERDICT}"
            exit 1
          fi

      - name: Post L2 results to PR
        if: always() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/l2-comment.md ]; then
            echo "No L2 results to post"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          MARKER="<!-- l2-verdict -->"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build final comment with marker and run link
          {
            echo "$MARKER"
            cat /tmp/l2-comment.md
            echo ""
            echo "---"
            echo "<sub>Posted by [L2 CI run](${RUN_URL}) • $(date -u '+%Y-%m-%d %H:%M UTC')</sub>"
          } > /tmp/l2-comment-final.md

          # Find existing comment with marker (update in-place on re-runs)
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments/${COMMENT_ID}" \
              -X PATCH -F body=@/tmp/l2-comment-final.md
            echo "Updated existing PR comment $COMMENT_ID"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/l2-comment-final.md
            echo "Created new PR comment"
          fi

  # L2 triage: diagnose L1 failures on PRs
  l2-triage:
    name: "L2: Triage L1 Failure"
    runs-on: ubuntu-latest
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      needs.l1-e2e-pr.result == 'failure'
    needs: [l1-e2e-pr]
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Wait for preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready within 30s" >&2
          exit 1

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Triage L1 failure
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -eo pipefail
          SCHEMA=$(cat packages/stiglab-ui/tests/l2-triage-schema.json)

          # Stream JSON events: parser prints live logs to stderr, captures result to file
          claude -p "$(cat <<'PROMPT'
          L1 e2e tests failed on this PR. Triage the failure.

          1. Read the failing L1 tests in packages/stiglab-ui/tests/e2e/
          2. Use agent-browser at http://localhost:5173 to reproduce and diagnose
          3. For each failed test, determine: regression, flaky, or environment issue
          4. Provide root cause and suggested fix
          PROMPT
          )" --max-turns 20 \
            --allowedTools "Bash,Read,Glob,Grep" \
            --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --json-schema "$SCHEMA" \
            | node packages/stiglab-ui/tests/parse-l2-stream.mjs /tmp/l2-triage.json

          echo "::group::Raw result JSON"
          cat /tmp/l2-triage.json
          echo "::endgroup::"

          # Try structured_output first, fall back to .result
          ROOT_CAUSE=$(jq -r '.structured_output.root_cause // empty' /tmp/l2-triage.json 2>/dev/null || true)
          if [ -z "$ROOT_CAUSE" ]; then
            echo "::warning::structured_output not found, falling back to .result"
            {
              echo "## L2: Triage L1 Failure"
              echo ""
              jq -r '.result // "No result field found"' /tmp/l2-triage.json 2>/dev/null || cat /tmp/l2-triage.json
            } > /tmp/l2-triage-comment.md
            cat /tmp/l2-triage-comment.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Write structured results to file and job summary
          {
            echo "## L2: Triage L1 Failure"
            echo ""
            echo "### Failed tests"
            echo "| Test | Diagnosis | Expected | Actual |"
            echo "|------|-----------|----------|--------|"
            jq -r '.structured_output.failed_tests[]? | "| \(.test) | \(.diagnosis) | \(.expected) | \(.actual) |"' /tmp/l2-triage.json
            echo ""
            echo "### Root cause"
            jq -r '.structured_output.root_cause' /tmp/l2-triage.json
            echo ""
            echo "### Suggested fix"
            jq -r '.structured_output.suggested_fix' /tmp/l2-triage.json
          } > /tmp/l2-triage-comment.md
          cat /tmp/l2-triage-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post triage results to PR
        if: always() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/l2-triage-comment.md ]; then
            echo "No triage results to post"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          MARKER="<!-- l2-triage -->"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build final comment with marker and run link
          {
            echo "$MARKER"
            cat /tmp/l2-triage-comment.md
            echo ""
            echo "---"
            echo "<sub>Posted by [L2 triage CI run](${RUN_URL}) • $(date -u '+%Y-%m-%d %H:%M UTC')</sub>"
          } > /tmp/l2-triage-comment-final.md

          # Find existing comment with marker (update in-place on re-runs)
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments/${COMMENT_ID}" \
              -X PATCH -F body=@/tmp/l2-triage-comment-final.md
            echo "Updated existing PR comment $COMMENT_ID"
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/l2-triage-comment-final.md
            echo "Created new PR comment"
          fi
