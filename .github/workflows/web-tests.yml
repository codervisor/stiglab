name: Web UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # L1 Smoke: Fast component tests — runs on every PR
  l1-smoke:
    name: "L1: Component Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run L1 smoke tests
        working-directory: packages/stiglab-ui
        run: npx vitest run --config vitest.config.ts

  # L1 E2E: Deterministic browser tests — runs on pre-release and main
  l1-e2e:
    name: "L1: E2E Regression Tests"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: npx agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Start preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          sleep 3

      - name: Run L1 e2e tests
        working-directory: packages/stiglab-ui
        env:
          STIGLAB_TEST_URL: http://localhost:5173
        run: npx vitest run --config vitest.e2e.config.ts

  # L1 E2E on PRs: Only smoke subset of e2e
  l1-e2e-pr:
    name: "L1: E2E Smoke (PR)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: npx agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Start preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          sleep 3

      - name: Run L1 e2e smoke tests
        working-directory: packages/stiglab-ui
        env:
          STIGLAB_TEST_URL: http://localhost:5173
        run: npx vitest run --config vitest.e2e.config.ts tests/e2e/smoke.test.ts

  # ── L2: AI-driven spec-based testing ──────────────────────────

  # L2 on PRs: Run spec checks + diff coverage for new features
  l2-pr:
    name: "L2: AI Spec Testing (PR)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [l1-smoke]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: npx agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Start preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          sleep 3

      - name: Run L2 diff-scoped PR testing
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run L2 web UI tests for this PR. Follow .claude/skills/web-testing.md.

            Key rules — keep it cheap:
            1. Read the PR diff FIRST. Only test what changed.
            2. Read packages/stiglab-ui/tests/l2/spec.toml
            3. Match diff files against spec `related_paths` — only run matching items
            4. For diff-touched files NOT in the spec, do a quick exploratory check
            5. Crystallize: if you validate new behavior, write an L1 test for it
            6. Post structured results per the skill's report format

            Server: http://localhost:5173 (static build, no backend API).
          claude_args: "--max-turns 25"

  # L2 triage: Runs when L1 e2e fails on PRs
  l2-triage:
    name: "L2: Triage L1 Failure"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && failure()
    needs: [l1-e2e-pr]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome for agent-browser
        run: npx agent-browser install --with-deps

      - name: Build UI
        run: pnpm build:ui

      - name: Start preview server
        working-directory: packages/stiglab-ui
        run: |
          npx vite preview --port 5173 &
          sleep 3

      - name: Triage L1 failure with L2
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            L1 e2e tests failed on this PR. Your job is to triage.

            1. Read the L2 test spec: packages/stiglab-ui/tests/l2/spec.toml
            2. Read the failing L1 test files in packages/stiglab-ui/tests/e2e/
            3. Use agent-browser against http://localhost:5173 to reproduce the
               failure and diagnose the root cause
            4. Check if the failure is a real regression or a flaky/environment issue
            5. Post a triage report as a PR comment with:
               - Which L1 tests failed and why
               - What the page actually shows (snapshot evidence)
               - Whether this is a real bug or false positive
               - Suggested fix if applicable
          claude_args: "--max-turns 20"
