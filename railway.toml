[[services]]
name = "stiglab-server"

[services.build]
builder = "dockerfile"
dockerfilePath = "docker/server/Dockerfile"

[services.deploy]
startCommand = "/app/stiglab-server"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.variables]
STIGLAB_HOST = "0.0.0.0"
STIGLAB_PORT = "${{PORT}}"
DATABASE_URL = "${{Postgres.DATABASE_URL}}"

[[services]]
name = "stiglab-agent"

[services.build]
builder = "dockerfile"
dockerfilePath = "docker/agent/Dockerfile"

[services.deploy]
startCommand = "/app/stiglab-agent"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.variables]
STIGLAB_SERVER_URL = "wss://${{stiglab-server.RAILWAY_PUBLIC_DOMAIN}}/agent/ws"
STIGLAB_NODE_NAME = "railway-agent"
STIGLAB_MAX_SESSIONS = "4"
