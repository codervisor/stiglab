[[services]]
name = "stiglab-server"

[services.build]
builder = "dockerfile"
dockerfilePath = "docker/server.Dockerfile"

[services.deploy]
startCommand = "/app/stiglab-server"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "stiglab-agent"

[services.build]
builder = "dockerfile"
dockerfilePath = "docker/agent.Dockerfile"

[services.deploy]
startCommand = "/app/stiglab-agent"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
